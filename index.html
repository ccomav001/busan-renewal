<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f0883e;

    --stage-착공: #3fb950;
    --stage-관리처분: #58a6ff;
    --stage-시행인가: #d2a8ff;
    --stage-조합설립: #ffa657;
    --stage-추진위원회: #ff7b72;
    --stage-구역지정: #79c0ff;
    --stage-사전타당성: #56d364;
    --stage-추진위전: #e3b341;
    --stage-재정비: #f778ba;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
  }

  /* Summary cards */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .summary-card .label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .summary-card .value {
    font-size: 28px;
    font-weight: 900;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
  }

  .summary-card .sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  select, .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  select:focus, .filter-btn:focus { outline: none; border-color: var(--accent); }

  .filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Stage legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .legend-item:hover { border-color: var(--border); color: var(--text); }
  .legend-item.active { border-color: currentColor; color: var(--text); }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* View toggle */
  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }

  .view-btn {
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }

  .view-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* Content area */
  #content { }

  /* District group */
  .district-section {
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .district-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .district-header:hover { background: #1f2937; }

  .district-name {
    font-size: 16px;
    font-weight: 700;
  }

  .district-meta {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .district-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }

  .collapse-icon {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.2s;
  }

  .district-body {
    padding: 16px 20px;
  }

  /* Stage group within district */
  .stage-group {
    margin-bottom: 14px;
  }

  .stage-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .stage-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(255,255,255,0.07);
  }

  .stage-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Zone items */
  .zones {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .zone-chip {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    border: 1px solid;
    opacity: 0.85;
    transition: opacity 0.15s;
    cursor: default;
  }

  .zone-chip:hover { opacity: 1; }

  .zone-chip .type-tag {
    font-size: 10px;
    opacity: 0.7;
    margin-left: 4px;
  }

  /* Stage view */
  .stage-section {
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .stage-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .stage-section-title {
    font-size: 16px;
    font-weight: 700;
  }

  .stage-section-body {
    padding: 16px 20px;
  }

  .district-in-stage {
    margin-bottom: 12px;
  }

  .district-in-stage-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 6px;
    padding-left: 2px;
  }

  /* No results */
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 48px;
    font-size: 14px;
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 6px;
  }

  @media (max-width: 768px) {
    .main { padding: 16px; }
    header { padding: 14px 16px; }
    header h1 { font-size: 14px; }
  }
</style>
</head>

<header>
  <h1>🏗 부산시 재개발·재건축 추진 현황</h1>
  <span>기준: 2026년 1월 말</span>

    </div>

        <option value="재건축">재건축</option>
        <option value="재정비촉진">재정비촉진</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <label>구 선택:</label>
      <select id="districtFilter" onchange="render()">
        <option value="all">전체</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <label>단계 선택:</label>
      <select id="stageFilter" onchange="render()">
        <option value="all">전체</option>
      </select>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend"></div>

  <!-- Content -->
  <div id="content"></div>
</div>

  { name: '시민공원 2-2구역', gu: '부산진구', stage: '조합설립', type: '재정비촉진' },
  { name: '서금사 A구역', gu: '금정구', stage: '시행인가', type: '재정비촉진' },
  { name: '서금사 5구역', gu: '금정구', stage: '시행인가', type: '재정비촉진' },
  { name: '서금사 6구역', gu: '금정구', stage: '시행인가', type: '재정비촉진' },
];

const allData = [...재개발data, ...재건축data, ...재정비data];

const STAGE_ORDER = ['착공','관리처분','시행인가','조합설립','추진위원회','구역지정','사전타당성','추진위전'];

// ==================== STATE ====================
let currentView = 'district';
let activeStages = new Set(STAGE_ORDER);

// ==================== INIT ====================
function init() {
  // Populate district filter
  const districts = [...new Set(allData.map(d => d.gu))].sort();
  const distSel = document.getElementById('districtFilter');
  districts.forEach(gu => {
    const opt = document.createElement('option');
    opt.value = gu; opt.textContent = gu;
    distSel.appendChild(opt);
  });

  // Populate stage filter
  const stageSel = document.getElementById('stageFilter');
  STAGE_ORDER.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    stageSel.appendChild(opt);
  });

  renderLegend();
  renderSummary();
  render();
}

function getFiltered() {
  const type = document.getElementById('typeFilter').value;
  const dist = document.getElementById('districtFilter').value;
  const stage = document.getElementById('stageFilter').value;
  return allData.filter(d => {
    if (type !== 'all' && d.type !== type) return false;
    if (dist !== 'all' && d.gu !== dist) return false;
    if (stage !== 'all' && d.stage !== stage) return false;
    if (!activeStages.has(d.stage)) return false;
    return true;
  });
}

function renderSummary() {
  const total = allData.length;
  const byType = {};
  allData.forEach(d => byType[d.type] = (byType[d.type]||0)+1);
  const byStage = {};
  allData.forEach(d => byStage[d.stage] = (byStage[d.stage]||0)+1);

  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="label">전체 추진 구역</div>
      <div class="value">${total}</div>
      <div class="sub">완료 구역 제외</div>
    </div>
    <div class="summary-card">
      <div class="label">재개발</div>
      <div class="value">${byType['재개발']||0}</div>
      <div class="sub">주택·도시정비형</div>
    </div>
    <div class="summary-card">
      <div class="label">재건축</div>
      <div class="value">${byType['재건축']||0}</div>
      <div class="sub">구역지정 전 포함</div>
    </div>
    <div class="summary-card">
      <div class="label">재정비촉진</div>
      <div class="value">${byType['재정비촉진']||0}</div>
      <div class="sub">3개 지구</div>
    </div>
    <div class="summary-card">
      <div class="label">착공 단계</div>
      <div class="value" style="color:${STAGE_COLORS['착공']}">${byStage['착공']||0}</div>
      <div class="sub">사업 본격 진행</div>
    </div>
    <div class="summary-card">
      <div class="label">사전타당성</div>
      <div class="value" style="color:${STAGE_COLORS['사전타당성']}">${byStage['사전타당성']||0}</div>
      <div class="sub">초기 검토 단계</div>
    </div>
  `;
}

function renderLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = STAGE_ORDER.map(s => `
    <div class="legend-item active" onclick="toggleStage('${s}', this)" data-stage="${s}">
      <div class="legend-dot" style="background:${STAGE_COLORS[s]}"></div>
      ${s}
    </div>
  `).join('');
}

function toggleStage(stage, el) {
  if (activeStages.has(stage)) {
    activeStages.delete(stage);
    el.classList.remove('active');
    el.style.opacity = '0.4';
  } else {
    activeStages.add(stage);
    el.classList.add('active');
    el.style.opacity = '1';
  }
  render();
}

function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const data = getFiltered();
  const content = document.getElementById('content');

  if (data.length === 0) {
    content.innerHTML = '<div class="empty">선택한 조건에 해당하는 구역이 없습니다.</div>';
    return;
  }

  if (currentView === 'district') {
    renderDistrictView(data, content);
  } else {
    renderStageView(data, content);
  }
}

function renderDistrictView(data, content) {
  const byDistrict = {};
  data.forEach(d => {
    if (!byDistrict[d.gu]) byDistrict[d.gu] = {};
    if (!byDistrict[d.gu][d.stage]) byDistrict[d.gu][d.stage] = [];
    byDistrict[d.gu][d.stage].push(d);
  });

  // Sort districts by total count desc
  const sortedDistricts = Object.keys(byDistrict).sort((a,b) => {
    const ca = Object.values(byDistrict[a]).reduce((s,v)=>s+v.length,0);
    const cb = Object.values(byDistrict[b]).reduce((s,v)=>s+v.length,0);
    return cb - ca;
  });

  content.innerHTML = sortedDistricts.map(gu => {
    const stageMap = byDistrict[gu];
    const total = Object.values(stageMap).reduce((s,v)=>s+v.length,0);

    const stagesHtml = STAGE_ORDER
      .filter(s => stageMap[s])
      .map(s => {
        const zones = stageMap[s];
        const color = STAGE_COLORS[s];
        return `
          <div class="stage-group">
            <div class="stage-header">
              <div class="stage-badge" style="color:${color};border:1px solid ${color}33">
                <div style="width:6px;height:6px;border-radius:50%;background:${color}"></div>
                ${s}
              </div>
              <span class="stage-count">${zones.length}개 구역</span>
            </div>
            <div class="zones">
              ${zones.map(z => `
                <div class="zone-chip" style="color:${color};border-color:${color}33;background:${color}0d">
                  ${z.name}${z.subtype ? `<span class="type-tag">[${z.type}]</span>` : z.type !== '재개발' ? `<span class="type-tag">[${z.type}]</span>` : ''}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

    return `
      <div class="district-section">
        <div class="district-header" onclick="toggleSection(this)">
          <div class="district-name">${gu}</div>
          <div class="district-meta">
            <span class="district-count">${total}개 구역</span>
            <span class="collapse-icon">▼</span>
          </div>
        </div>
        <div class="district-body">
          ${stagesHtml}
        </div>
      </div>
    `;
  }).join('');
}

function renderStageView(data, content) {
  const byStage = {};
  data.forEach(d => {
    if (!byStage[d.stage]) byStage[d.stage] = {};
    if (!byStage[d.stage][d.gu]) byStage[d.stage][d.gu] = [];
    byStage[d.stage][d.gu].push(d);
  });

  content.innerHTML = STAGE_ORDER.filter(s => byStage[s]).map(s => {
    const distMap = byStage[s];
    const total = Object.values(distMap).reduce((sum,v)=>sum+v.length,0);
    const color = STAGE_COLORS[s];

    const distHtml = Object.keys(distMap).sort().map(gu => `
      <div class="district-in-stage">
        <div class="district-in-stage-label">${gu}</div>
        <div class="zones">
          ${distMap[gu].map(z => `
            <div class="zone-chip" style="color:${color};border-color:${color}33;background:${color}0d">
              ${z.name}${z.type !== '재개발' ? `<span class="type-tag">[${z.type}]</span>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');

    return `
      <div class="stage-section">
        <div class="stage-section-header">
          <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
          <div class="stage-section-title" style="color:${color}">${s}</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)">${total}개 구역</div>
        </div>
        <div class="stage-section-body">
          ${distHtml}
        </div>
      </div>
    `;
  }).join('');
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('.collapse-icon');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    icon.style.transform = 'rotate(0deg)';
  } else {
    body.style.display = 'none';
    icon.style.transform = 'rotate(-90deg)';
  }
}

init();
</script>
</body>
</html>
