<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부산시 재개발·재건축 추진 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f0883e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    flex-wrap: wrap; gap: 10px;
  }
  header h1 { font-size: 16px; font-weight: 700; }
  header span { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  .header-btns { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-edit { border-color: #f0883e55; color: var(--accent); }
  .btn-edit.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-save { background: #238636; border-color: #2ea043; color: white; }
  .btn-save:hover { background: #2ea043; color: white; }

  .main { max-width: 1400px; margin: 0 auto; padding: 28px; }

  /* Summary */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 28px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .summary-card .label { font-size: 10px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-card .value { font-size: 26px; font-weight: 900; font-family: 'IBM Plex Mono', monospace; color: var(--accent); }
  .summary-card .sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* Controls */
  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 12px; color: var(--muted); }
  select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 6px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  select:focus { outline: none; border-color: var(--accent); }

  .view-toggle { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 3px; }
  .view-btn { padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; border: none; background: transparent; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
  .view-btn.active { background: var(--accent); color: #000; font-weight: 700; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); cursor: pointer; padding: 3px 9px; border-radius: 20px; border: 1px solid transparent; transition: all 0.15s; }
  .legend-item:hover { border-color: var(--border); color: var(--text); }
  .legend-item.active { border-color: currentColor; color: var(--text); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* District section */
  .district-section { margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .district-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .district-header:hover { background: #1f2937; }
  .district-name { font-size: 15px; font-weight: 700; }
  .district-count { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); }
  .district-body { padding: 14px 18px; }

  .stage-group { margin-bottom: 12px; }
  .stage-header { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
  .stage-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.06); }
  .stage-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  .zones { display: flex; flex-wrap: wrap; gap: 5px; }

  /* Zone chip */
  .zone-chip {
    padding: 4px 10px; border-radius: 4px; font-size: 12px; border: 1px solid;
    opacity: 0.85; transition: all 0.15s; cursor: default; position: relative;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .zone-chip:hover { opacity: 1; }
  .zone-chip .type-tag { font-size: 10px; opacity: 0.65; }

  /* Edit mode */
  body.edit-mode .zone-chip { cursor: pointer; }
  body.edit-mode .zone-chip:hover { transform: scale(1.04); box-shadow: 0 0 0 2px var(--accent); opacity: 1; }
  body.edit-mode .zone-chip::after { content: '✏️'; font-size: 9px; opacity: 0; transition: opacity 0.15s; }
  body.edit-mode .zone-chip:hover::after { opacity: 1; }

  .edit-notice {
    display: none;
    background: #f0883e22;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 20px;
    align-items: center;
    gap: 8px;
  }
  body.edit-mode .edit-notice { display: flex; }

  /* Stage section (stage view) */
  .stage-section { margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .stage-section-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .stage-section-title { font-size: 15px; font-weight: 700; }
  .stage-section-body { padding: 14px 18px; }
  .district-in-stage { margin-bottom: 10px; }
  .district-in-stage-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 5px; }

  .empty { text-align: center; color: var(--muted); padding: 48px; font-size: 14px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; font-weight: 500; }
  .modal input, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 10px 12px; border-radius: 6px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    margin-bottom: 16px;
  }
  .modal input:focus, .modal select:focus { outline: none; border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel { background: transparent; border-color: var(--border); color: var(--muted); }
  .btn-confirm { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .btn-confirm:hover { background: #e07728; color: #000; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #238636; color: white; padding: 12px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 700; z-index: 2000; transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .main { padding: 14px; }
    header { padding: 12px 14px; }
  }
</style>
</head>

<header>

  <div class="header-btns">

    <button class="btn btn-save" id="saveBtn" onclick="saveData()" style="display:none">💾 저장</button>
  </div>
</header>

<div class="main">

  <div class="edit-notice" id="editNotice">

  </div>

  <div class="controls">

      <button class="view-btn active" id="vbDistrict" onclick="setView('district',this)">구별 보기</button>

    </div>
    <div style="display:flex;align-items:center;gap:7px;">
      <label>사업유형:</label>
      <select id="typeFilter" onchange="render()">
        <option value="all">전체</option>
        <option value="재개발">재개발</option>
        <option value="재건축">재건축</option>
        <option value="재정비촉진">재정비촉진</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:7px;">
      <label>구 선택:</label>
      <select id="districtFilter" onchange="render()">
        <option value="all">전체</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:7px;">
      <label>단계:</label>
      <select id="stageFilter" onchange="render()">
        <option value="all">전체</option>
      </select>
    </div>
  </div>

  <div class="legend" id="legend"></div>
  <div id="content"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">구역 정보 수정</h3>
    <div class="modal-sub" id="modalSub"></div>
    <label>구(區) 변경</label>
    <select id="modalGu"></select>
    <label>단계 변경</label>
    <select id="modalStage"></select>

      <button class="btn btn-confirm" onclick="applyEdit()">수정 완료</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// localStorage로 수정사항 유지
function loadData() {
  const saved = localStorage.getItem('busanRenewalData');
  if (saved) {
    try { DATA = JSON.parse(saved); } catch(e) {}
  }
}
function persistData() {
  localStorage.setItem('busanRenewalData', JSON.stringify(DATA));
}

let activeStages = new Set(STAGE_ORDER);

function init() {
  loadData();
  const distSel = document.getElementById('districtFilter');
  ALL_GU.forEach(gu => {
    const o = document.createElement('option');
    o.value = gu; o.textContent = gu;
    distSel.appendChild(o);
  });
  const stageSel = document.getElementById('stageFilter');
  STAGE_ORDER.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    stageSel.appendChild(o);
  });
  // Modal gu options
  const modalGu = document.getElementById('modalGu');
  ALL_GU.forEach(gu => {
    const o = document.createElement('option');
    o.value = gu; o.textContent = gu;
    modalGu.appendChild(o);
  });
  // Modal stage options
  const modalStage = document.getElementById('modalStage');
  STAGE_ORDER.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    modalStage.appendChild(o);
  });
  renderLegend();
  renderSummary();
  render();
}

function getFiltered() {
  const type = document.getElementById('typeFilter').value;
  const dist = document.getElementById('districtFilter').value;
  const stage = document.getElementById('stageFilter').value;
  return DATA.filter((d,i) => {
    if (type !== 'all' && d.type !== type) return false;
    if (dist !== 'all' && d.gu !== dist) return false;
    if (stage !== 'all' && d.stage !== stage) return false;
    if (!activeStages.has(d.stage)) return false;
    return true;
  });
}

function renderSummary() {
  const byType = {};
  DATA.forEach(d => byType[d.type] = (byType[d.type]||0)+1);
  const byStage = {};
  DATA.forEach(d => byStage[d.stage] = (byStage[d.stage]||0)+1);
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="label">전체 추진 구역</div><div class="value">${DATA.length}</div><div class="sub">완료 구역 제외</div></div>
    <div class="summary-card"><div class="label">재개발</div><div class="value">${byType['재개발']||0}</div><div class="sub">주택·도시정비형</div></div>
    <div class="summary-card"><div class="label">재건축</div><div class="value">${byType['재건축']||0}</div><div class="sub">구역지정 전 포함</div></div>
    <div class="summary-card"><div class="label">재정비촉진</div><div class="value">${byType['재정비촉진']||0}</div><div class="sub">3개 지구</div></div>
    <div class="summary-card"><div class="label">착공 단계</div><div class="value" style="color:${STAGE_COLORS['착공']}">${byStage['착공']||0}</div><div class="sub">사업 본격 진행</div></div>
    <div class="summary-card"><div class="label">사전타당성</div><div class="value" style="color:${STAGE_COLORS['사전타당성']}">${byStage['사전타당성']||0}</div><div class="sub">초기 검토 단계</div></div>
  `;
}

function renderLegend() {
  document.getElementById('legend').innerHTML = STAGE_ORDER.map(s => `
    <div class="legend-item active" onclick="toggleStage('${s}',this)">
      <div class="legend-dot" style="background:${STAGE_COLORS[s]}"></div>${s}
    </div>
  `).join('');
}

function toggleStage(stage, el) {
  if (activeStages.has(stage)) { activeStages.delete(stage); el.classList.remove('active'); el.style.opacity='0.4'; }
  else { activeStages.add(stage); el.classList.add('active'); el.style.opacity='1'; }
  render();
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const data = getFiltered();
  const content = document.getElementById('content');
  if (!data.length) { content.innerHTML = '<div class="empty">선택한 조건에 해당하는 구역이 없습니다.</div>'; return; }
  currentView === 'district' ? renderDistrict(data, content) : renderStage(data, content);
}

function chipHtml(d, globalIdx, color) {
  const editAttr = editMode ? `onclick="openModal(${globalIdx})" title="클릭하여 수정"` : '';
  return `<div class="zone-chip" style="color:${color};border-color:${color}33;background:${color}0d" ${editAttr}>
    ${d.name}${d.type!=='재개발'?`<span class="type-tag">[${d.type}]</span>`:''}
  </div>`;
}

function renderDistrict(data, content) {
  const byDistrict = {};
  data.forEach(d => {
    const idx = DATA.indexOf(d);
    if (!byDistrict[d.gu]) byDistrict[d.gu] = {};
    if (!byDistrict[d.gu][d.stage]) byDistrict[d.gu][d.stage] = [];
    byDistrict[d.gu][d.stage].push({d, idx});
  });
  const sorted = Object.keys(byDistrict).sort((a,b) => {
    const ca = Object.values(byDistrict[a]).reduce((s,v)=>s+v.length,0);
    const cb = Object.values(byDistrict[b]).reduce((s,v)=>s+v.length,0);
    return cb-ca;
  });
  content.innerHTML = sorted.map(gu => {
    const sm = byDistrict[gu];
    const total = Object.values(sm).reduce((s,v)=>s+v.length,0);
    const stagesHtml = STAGE_ORDER.filter(s=>sm[s]).map(s => {
      const color = STAGE_COLORS[s];
      return `<div class="stage-group">
        <div class="stage-header">
          <div class="stage-badge" style="color:${color};border:1px solid ${color}33">
            <div style="width:5px;height:5px;border-radius:50%;background:${color}"></div>${s}
          </div>
          <span class="stage-count">${sm[s].length}개</span>
        </div>
        <div class="zones">${sm[s].map(({d,idx})=>chipHtml(d,idx,color)).join('')}</div>
      </div>`;
    }).join('');
    return `<div class="district-section">
      <div class="district-header" onclick="toggleSection(this)">
        <div class="district-name">${gu}</div>
        <div style="display:flex;gap:12px;align-items:center">
          <span class="district-count">${total}개 구역</span>
          <span style="color:var(--muted);font-size:13px">▼</span>
        </div>
      </div>
      <div class="district-body">${stagesHtml}</div>
    </div>`;
  }).join('');
}

function renderStage(data, content) {
  const byStage = {};
  data.forEach(d => {
    const idx = DATA.indexOf(d);
    if (!byStage[d.stage]) byStage[d.stage] = {};
    if (!byStage[d.stage][d.gu]) byStage[d.stage][d.gu] = [];
    byStage[d.stage][d.gu].push({d,idx});
  });
  content.innerHTML = STAGE_ORDER.filter(s=>byStage[s]).map(s => {
    const dm = byStage[s];
    const total = Object.values(dm).reduce((sum,v)=>sum+v.length,0);
    const color = STAGE_COLORS[s];
    const distHtml = Object.keys(dm).sort().map(gu => `
      <div class="district-in-stage">
        <div class="district-in-stage-label">${gu}</div>
        <div class="zones">${dm[gu].map(({d,idx})=>chipHtml(d,idx,color)).join('')}</div>
      </div>`).join('');
    return `<div class="stage-section">
      <div class="stage-section-header">
        <div style="width:9px;height:9px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <div class="stage-section-title" style="color:${color}">${s}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)">${total}개 구역</div>
      </div>
      <div class="stage-section-body">${distHtml}</div>
    </div>`;
  }).join('');
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('span:last-child');
  if (body.style.display === 'none') { body.style.display='block'; icon.style.transform=''; }
  else { body.style.display='none'; icon.style.transform='rotate(-90deg)'; }
}

// ===== EDIT MODE =====
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editToggleBtn');
  const saveBtn = document.getElementById('saveBtn');
  btn.textContent = editMode ? '✏️ 편집 종료' : '✏️ 편집 모드';
  btn.classList.toggle('active', editMode);
  saveBtn.style.display = editMode ? 'inline-flex' : 'none';
  render();
}

function openModal(idx) {
  if (!editMode) return;
  editTarget = idx;
  const d = DATA[idx];
  document.getElementById('modalTitle').textContent = `"${d.name}" 수정`;
  document.getElementById('modalSub').textContent = `현재: ${d.gu} · ${d.stage} · ${d.type}`;
  document.getElementById('modalGu').value = d.gu;
  document.getElementById('modalStage').value = d.stage;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editTarget = null;
}

function applyEdit() {
  if (editTarget === null) return;
  const newGu = document.getElementById('modalGu').value;
  const newStage = document.getElementById('modalStage').value;
  const d = DATA[editTarget];
  const oldGu = d.gu, oldStage = d.stage;
  d.gu = newGu;
  d.stage = newStage;
  closeModal();
  render();
  renderSummary();
  showToast(`✅ "${d.name}" → ${newGu} / ${newStage} 수정됨`);
}

function saveData() {
  persistData();
  showToast('💾 수정사항이 저장되었습니다!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
</html>
